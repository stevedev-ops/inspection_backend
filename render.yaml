databases:
  - name: inspection-db
    plan: free
    databaseName: inspection
    user: inspection_user

services:
  - type: web
    name: inspection-backend
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inspection-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
